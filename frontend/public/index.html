<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="RTFM Capital Bank - MERN Stack Banking Application"
    />
    <title>RTFM Capital Bank</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <!-- Preloader -->
    <div id="preloader">
      <div class="preloader-container">
        <div class="rtfm-preloader">
          <span class="rtfm-letter r">R</span>
          <span class="rtfm-letter t">T</span>
          <span class="rtfm-letter f">F</span>
          <span class="rtfm-letter m">M</span>
        </div>
        <div class="preloader-subtitle">Capital Bank</div>
        <div class="preloader-bar">
          <div class="preloader-progress"></div>
        </div>
        <div class="preloader-message">Loading secure banking platform...</div>
      </div>
    </div>

    <div id="root"></div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
